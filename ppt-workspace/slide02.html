<body style="margin:0;padding:0;width:720pt;height:405pt;overflow:hidden;background-color:#211F40;font-family:'Microsoft YaHei','Candara',sans-serif;display:flex;flex-direction:column;">

      </div>

    <div style="background:rgba(255,255,255,0.08);border:1pt solid rgba(255,255,255,0.15);border-radius:8pt;padding:14pt 18pt;display:flex;align-items:flex-start;gap:12pt;">

      </div>
      <div style="flex:1;min-width:0;">
        <p style="font-size:15pt;font-weight:bold;color:#FFFFFF;margin:0;line-height:1.5;">Кажется, что настроение скачет непредсказуемо</p>

    </div>
