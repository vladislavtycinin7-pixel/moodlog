{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Новая запись о настроении</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('add_entry') }}">
                    <div class="mb-3">
                        <label for="date" class="form-label">Дата</label>
                        <input type="date" class="form-control" id="date" name="date" value="{{ today }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="mood_score" class="form-label">Оценка настроения (1-10)</label>
                        <input type="range" class="form-range" id="mood_score" name="mood_score" min="1" max="10" value="5" oninput="updateMoodLabel(this.value)">
                        <div class="d-flex justify-content-between">
                            <span> Плохо</span>
                            <span id="mood_value">5</span>
                            <span> Отлично</span>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="mood_label" class="form-label">Описание настроения</label>
                        <select class="form-select" id="mood_label" name="mood_label" required>
                            <option value="Отличное"> Отличное</option>
                            <option value="Хорошее"> Хорошее</option>
                            <option value="Нейтральное"> Нейтральное</option>
                            <option value="Грустное"> Грустное</option>
                            <option value="Тревожное"> Тревожное</option>
                            <option value="Раздраженное"> Раздраженное</option>
                            <option value="Уставшее"> Уставшее</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="sleep_hours" class="form-label"> Сон (часы)</label>
                        <input type="number" step="0.5" min="0" max="24" class="form-control" id="sleep_hours" name="sleep_hours" placeholder="8">
                    </div>
                    
                    <div class="mb-3">
                        <label for="notes" class="form-label"> Заметки</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="Что произошло сегодня?"></textarea>
                    </div>
                    
                    <!-- НОВЫЕ ПОЛЯ -->
                    <div class="mb-3">
                        <label for="good_thing" class="form-label"> Что хорошего случилось сегодня?</label>
                        <textarea class="form-control" id="good_thing" name="good_thing" rows="2" 
                                  placeholder="Позитивные моменты, достижения, приятные встречи..."></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="bad_thing" class="form-label"> Что плохого случилось сегодня?</label>
                        <textarea class="form-control" id="bad_thing" name="bad_thing" rows="2" 
                                  placeholder="Трудности, неприятности, стрессовые ситуации..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Сохранить запись</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function updateMoodLabel(value) {
    document.getElementById('mood_value').textContent = value;
}
</script>
{% endblock %}
