{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h4 class="mb-0">Редактирование записи от {{ entry.date.strftime('%d.%m.%Y') }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="mood_score" class="form-label">Оценка настроения (1-10)</label>
                        <input type="range" class="form-range" id="mood_score" name="mood_score" 
                               min="1" max="10" value="{{ entry.mood_score }}" oninput="updateMoodLabel(this.value)">
                        <div class="d-flex justify-content-between">
                            <span> Плохо</span>
                            <span id="mood_value">{{ entry.mood_score }}</span>
                            <span> Отлично</span>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="mood_label" class="form-label">Описание настроения</label>
                        <select class="form-select" id="mood_label" name="mood_label" required>
                            <option value="Отличное" {% if entry.mood_label == 'Отличное' %}selected{% endif %}> Отличное</option>
                            <option value="Хорошее" {% if entry.mood_label == 'Хорошее' %}selected{% endif %}> Хорошее</option>
                            <option value="Нейтральное" {% if entry.mood_label == 'Нейтральное' %}selected{% endif %}> Нейтральное</option>
                            <option value="Грустное" {% if entry.mood_label == 'Грустное' %}selected{% endif %}> Грустное</option>
                            <option value="Тревожное" {% if entry.mood_label == 'Тревожное' %}selected{% endif %}> Тревожное</option>
                            <option value="Раздраженное" {% if entry.mood_label == 'Раздраженное' %}selected{% endif %}> Раздраженное</option>
                            <option value="Уставшее" {% if entry.mood_label == 'Уставшее' %}selected{% endif %}> Уставшее</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="sleep_hours" class="form-label"> Сон (часы)</label>
                        <input type="number" step="0.5" min="0" max="24" class="form-control" 
                               id="sleep_hours" name="sleep_hours" value="{{ entry.sleep_hours or '' }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="notes" class="form-label"> Заметки</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3">{{ entry.notes or '' }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="good_thing" class="form-label"> Что хорошего случилось?</label>
                        <textarea class="form-control" id="good_thing" name="good_thing" rows="2">{{ entry.good_thing or '' }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="bad_thing" class="form-label"> Что плохого случилось?</label>
                        <textarea class="form-control" id="bad_thing" name="bad_thing" rows="2">{{ entry.bad_thing or '' }}</textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-warning"> Сохранить изменения</button>
                    <a href="{{ url_for('view_entry', entry_id=entry.id) }}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function updateMoodLabel(value) {
    document.getElementById('mood_value').textContent = value;
}
</script>
{% endblock %}
