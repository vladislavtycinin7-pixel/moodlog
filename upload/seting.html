<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodLog — Настройки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
        }

        /* Фоновый градиент */
        .bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(139, 92, 246, 0.4), rgba(0, 0, 0, 0) 60%),
                        radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.3), rgba(0, 0, 0, 0) 60%),
                        radial-gradient(circle at 50% 20%, rgba(168, 85, 247, 0.35), rgba(0, 0, 0, 0) 50%);
            filter: blur(80px);
            z-index: 0;
        }

        /* Шапка */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            padding: 20px 0;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 500;
            color: white;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-link:hover {
            color: white;
        }

        .nav-link-primary {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
        }

        /* Кнопка-шестерёнка с анимацией прокрутки */
        .settings-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 20px;
            padding: 8px 0 8px 8px;
            color: rgba(255, 255, 255, 0.7);
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
        }

        .settings-btn.rotate {
            transform: rotate(180deg);
        }

        .settings-btn:hover {
            color: white;
        }

        /* Затемнение фона */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 150;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s ease, opacity 0.3s ease;
        }

        .overlay.active {
            visibility: visible;
            opacity: 1;
        }

        /* Боковое меню (выезжает справа) */
        .side-menu {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100%;
            background: rgba(18, 18, 24, 0.98);
            backdrop-filter: blur(12px);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 200;
            transition: right 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 80px 24px 24px;
            display: flex;
            flex-direction: column;
        }

        .side-menu.open {
            right: 0;
        }

        /* Профиль */
        .profile-section {
            text-align: center;
            padding-bottom: 28px;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 500;
        }

        .username {
            font-size: 17px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .user-email {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.45);
        }

        /* Пункты меню — без эмодзи */
        .menu-items {
            flex: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 12px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: 0.2s;
            color: rgba(255, 255, 255, 0.75);
            border-bottom: 1px solid transparent;
        }

        .menu-item:hover {
            color: white;
            border-bottom-color: #a855f7;
        }

        .menu-item-text {
            font-size: 14px;
            font-weight: 450;
            letter-spacing: 0.3px;
        }

        /* Кнопка выхода */
        .logout-item {
            margin-top: auto;
            color: rgba(248, 113, 113, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 20px;
            margin-top: 20px;
            border-bottom: none;
        }

        .logout-item:hover {
            color: #f87171;
            border-bottom-color: #f87171;
        }

        /* Минимальная главная секция */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 70px;
            z-index: 1;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 500;
            letter-spacing: -1px;
            margin-bottom: 16px;
        }

        .hero p {
            color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 700px) {
            .nav-container {
                padding: 0 24px;
            }
            .nav-links {
                gap: 20px;
            }
            .nav-link {
                font-size: 12px;
            }
            .hero h1 {
                font-size: 32px;
            }
            .side-menu {
                width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="bg"></div>

    <!-- ШАПКА -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">MoodLog</div>
            <div class="nav-links">
                <a class="nav-link">Главная</a>
                <a class="nav-link">Добавить запись</a>
                <a class="nav-link">Статистика</a>
                <a class="nav-link nav-link-primary">Вход</a>
                <button class="settings-btn" id="settingsBtn">⚙</button>
            </div>
        </div>
    </nav>

    <!-- Затемнение -->
    <div class="overlay" id="overlay"></div>

    <!-- Боковое меню (настройки) — без эмодзи -->
    <div class="side-menu" id="sideMenu">
        <div class="profile-section">
            <div class="avatar">A</div>
            <div class="username">alex_mood</div>
            <div class="user-email">alex@moodlog.com</div>
        </div>

        <div class="menu-items">
            <div class="menu-item" onclick="alert('Профиль: настройка личных данных')">
                <div class="menu-item-text">Профиль</div>
            </div>
            <div class="menu-item" onclick="alert('Смена темы оформления')">
                <div class="menu-item-text">Тема</div>
            </div>
            <div class="menu-item" onclick="alert('Статистика настроений')">
                <div class="menu-item-text">Статистика</div>
            </div>
        </div>

        <div class="menu-item logout-item" onclick="alert('Выход из аккаунта')">
            <div class="menu-item-text">Выйти</div>
        </div>
    </div>

    <!-- МИНИМАЛЬНАЯ ГЛАВНАЯ -->
    <section class="hero">
        <div>
            <h1>Дневник настроения</h1>
            <p>Нажмите на шестерёнку справа вверху</p>
        </div>
    </section>

    <script>
        const settingsBtn = document.getElementById('settingsBtn');
        const overlay = document.getElementById('overlay');
        const sideMenu = document.getElementById('sideMenu');

        let isOpen = false;

        function openSettings() {
            sideMenu.classList.add('open');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            settingsBtn.classList.add('rotate');
            isOpen = true;
        }

        function closeSettings() {
            sideMenu.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            settingsBtn.classList.remove('rotate');
            isOpen = false;
        }

        function toggleSettings() {
            if (isOpen) {
                closeSettings();
            } else {
                openSettings();
            }
        }

        settingsBtn.addEventListener('click', toggleSettings);
        overlay.addEventListener('click', closeSettings);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && isOpen) {
                closeSettings();
            }
        });
    </script>
</body>
</html>
